name: Spring Boot + React CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout source code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Setup Java
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      # Build Spring Boot
      - name: Build Backend
        run: |
          cd backend
          mvn clean install

      # Setup Node.js
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # Install React dependencies
      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm install

      # Build React
      - name: Build Frontend
        run: |
          cd frontend
          npm run build
